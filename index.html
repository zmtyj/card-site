<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f9fa; --card-bg: #ffffff; --primary: #1a1a2e; --accent: #3b82f6;
    --text: #374151; --text-muted: #6b7280; --border: #e5e7eb;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px; line-height: 1.6;
  }
  .card { background: var(--card-bg); border-radius: 12px; box-shadow: var(--shadow); max-width: 480px; width: 100%; overflow: hidden; border: 1px solid var(--border); }
  .card-header { background: var(--primary); padding: 40px 32px 32px; text-align: center; color: #ffffff; }
  .avatar { width: 96px; height: 96px; border-radius: 50%; border: 3px solid rgba(255,255,255,.3); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,.1); font-size: 40px; color: rgba(255,255,255,.7); }
  .name { font-size: 28px; font-weight: 700; letter-spacing: 2px; margin-bottom: 4px; }
  .title { font-size: 15px; opacity: .85; }
  .company { font-size: 13px; opacity: .7; margin-top: 4px; }
  .card-body { padding: 28px 32px 32px; }
  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 12px; font-weight: 600; }
  .contact-list { list-style: none; display: flex; flex-direction: column; gap: 14px; }
  .contact-item { display: flex; align-items: center; gap: 12px; font-size: 15px; color: var(--text); text-decoration: none; padding: 8px 0; border-bottom: 1px solid var(--border); transition: color .15s; }
  .contact-item:last-child { border-bottom: none; }
  a.contact-item:hover { color: var(--accent); }
  .contact-icon { width: 36px; height: 36px; border-radius: 8px; background: #f3f4f6; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }
  .contact-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .contact-value { font-size: 15px; }
  .card-footer { background: #f9fafb; padding: 20px 32px; border-top: 1px solid var(--border); display: flex; gap: 12px; justify-content: center; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; border: none; cursor: pointer; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--border); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  @media (max-width: 480px) {
    body { padding: 12px; align-items: flex-start; padding-top: 40px; }
    .card-header { padding: 32px 20px 24px; }
    .card-body { padding: 20px; }
    .card-footer { padding: 16px 20px; flex-direction: column; }
    .btn { justify-content: center; }
    .name { font-size: 24px; }
  }
</style>
</head>
