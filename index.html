<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邓倩玉 - 个人名片</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--rose-50:#fff1f2;--rose-100:#ffe4e6;--rose-400:#fb7185;--rose-500:#f43f5e;--rose-600:#e11d48;--slate-50:#f8fafc;--slate-100:#f1f5f9;--slate-200:#e2e8f0;--slate-300:#cbd5e1;--slate-400:#94a3b8;--slate-500:#64748b;--slate-700:#334155;--slate-800:#1e293b;--slate-900:#0f172a;--gold:#b8860b;--gold-light:#d4a853}
  body{font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:32px 20px;background:linear-gradient(135deg,#fdf2f4 0%,#f0e6ef 30%,#e8e0f0 60%,#fdf2f4 100%);background-attachment:fixed;color:var(--slate-700);line-height:1.6}
  body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 30%,rgba(251,113,133,.06) 0%,transparent 50%),radial-gradient(ellipse 60% 50% at 80% 70%,rgba(168,85,247,.04) 0%,transparent 50%);pointer-events:none;z-index:0}

  .page-wrapper{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:28px;width:100%;max-width:540px}

  .card{background:rgba(255,255,255,.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:20px;box-shadow:0 4px 6px rgba(0,0,0,.04),0 20px 40px rgba(0,0,0,.06),0 1px 0 rgba(255,255,255,.5) inset;width:100%;overflow:hidden;border:1px solid rgba(251,113,133,.12);transition:transform .3s ease,box-shadow .3s ease}
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 12px rgba(0,0,0,.05),0 24px 48px rgba(0,0,0,.08),0 1px 0 rgba(255,255,255,.5) inset}

  .card-header{background:linear-gradient(135deg,#2d1b35 0%,#3b2045 30%,#2d1b35 100%);padding:48px 36px 40px;text-align:center;color:#fff;position:relative;overflow:hidden}
  .card-header::before{content:"";position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 40%,rgba(251,113,133,.15) 0%,transparent 40%),radial-gradient(circle at 70% 60%,rgba(212,168,83,.1) 0%,transparent 40%);pointer-events:none}
  .card-header>*{position:relative;z-index:1}
  .avatar-ring{width:104px;height:104px;border-radius:50%;margin:0 auto 20px;padding:3px;background:linear-gradient(135deg,var(--rose-400),var(--gold-light),var(--rose-400));position:relative}
  .avatar{width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,#3b2045,#4a2855);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .avatar svg{width:56px;height:56px;opacity:.9}
  .name-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:6px}
  .name{font-size:30px;font-weight:700;letter-spacing:4px;text-shadow:0 1px 2px rgba(0,0,0,.2)}
  .gender-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:rgba(251,113,133,.2);font-size:13px}
  .title{font-size:15px;opacity:.8;font-weight:400;letter-spacing:2px}
  .divider-dot{display:flex;align-items:center;justify-content:center;gap:6px;margin:20px 0 0;opacity:.4}
  .divider-dot span{width:4px;height:4px;border-radius:50%;background:#fff}
  .card-body{padding:32px 36px 28px}
  .contact-grid{display:grid;grid-template-columns:1fr;gap:4px}
  .contact-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:12px;text-decoration:none;color:var(--slate-700);transition:background .2s ease,transform .2s ease;cursor:default}
  a.contact-item{cursor:pointer}
  a.contact-item:hover{background:var(--rose-50);transform:translateX(4px)}
  .contact-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s ease}
  a.contact-item:hover .contact-icon{transform:scale(1.08)}
  .contact-icon.phone{background:#fce7f3;color:#db2777}
  .contact-icon.email{background:#ede9fe;color:#7c3aed}
  .contact-icon.web{background:#e0f2fe;color:#0284c7}
  .contact-icon.location{background:#fef3c7;color:#d97706}
  .contact-icon.wechat{background:#dcfce7;color:#16a34a}
  .contact-info{flex:1;min-width:0}
  .contact-label{font-size:11px;color:var(--slate-400);font-weight:600;letter-spacing:.5px;margin-bottom:2px}
  .contact-value{font-size:15px;font-weight:500;color:var(--slate-800);word-break:break-all}
  .card-footer{padding:20px 36px 32px;display:flex;gap:12px}
  .btn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:14px;font-size:15px;font-weight:600;text-decoration:none;border:none;cursor:pointer;transition:all .2s ease;letter-spacing:.5px}
  .btn-primary{background:linear-gradient(135deg,#db2777,#e11d48);color:#fff;box-shadow:0 4px 12px rgba(219,39,119,.25)}
  .btn-primary:hover{box-shadow:0 6px 20px rgba(219,39,119,.35);transform:translateY(-1px)}
  .btn-outline{background:transparent;color:var(--rose-600);border:2px solid var(--rose-100)}
  .btn-outline:hover{background:var(--rose-50);border-color:var(--rose-400)}
  .save-tip{text-align:center;padding:0 36px 28px;font-size:12px;color:var(--slate-400)}
  .save-tip a{color:var(--rose-500);text-decoration:none;font-weight:600}
  .save-tip a:hover{text-decoration:underline}

  /* Video Section */
  .video-card{background:rgba(255,255,255,.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:20px;box-shadow:0 4px 6px rgba(0,0,0,.04),0 20px 40px rgba(0,0,0,.06),0 1px 0 rgba(255,255,255,.5) inset;width:100%;overflow:hidden;border:1px solid rgba(251,113,133,.12);transition:transform .3s ease,box-shadow .3s ease}
  .video-card:hover{transform:translateY(-2px);box-shadow:0 8px 12px rgba(0,0,0,.05),0 24px 48px rgba(0,0,0,.08),0 1px 0 rgba(255,255,255,.5) inset}
  .video-header{background:linear-gradient(135deg,#2d1b35 0%,#3b2045 30%,#2d1b35 100%);padding:18px 36px;display:flex;align-items:center;gap:10px;color:#fff}
  .video-header svg{flex-shrink:0;opacity:.85}
  .video-header-text{font-size:14px;font-weight:600;letter-spacing:1px}
  .video-body{padding:24px 28px 28px}
  .video-wrapper{position:relative;width:100%;border-radius:14px;overflow:hidden;background:#0f0f1a;box-shadow:0 8px 32px rgba(0,0,0,.15);aspect-ratio:16/9}
  .video-wrapper video{display:block;width:100%;height:100%;object-fit:cover}
  .video-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:rgba(255,255,255,.5);pointer-events:none;transition:opacity .3s ease}
  .video-placeholder.hidden{opacity:0}
  .video-placeholder svg{width:56px;height:56px;opacity:.4}
  .video-placeholder-text{font-size:13px;letter-spacing:1px}
  .video-hint{padding:0 28px 20px;text-align:center;font-size:12px;color:var(--slate-400)}
  .video-hint a{color:var(--rose-500);text-decoration:none;font-weight:600}
  .video-hint a:hover{text-decoration:underline}

  @media(max-width:480px){
    body{padding:20px 12px;align-items:flex-start;padding-top:32px}
    .page-wrapper{gap:20px}
    .card-header{padding:36px 20px 32px}
    .card-body{padding:24px 20px 20px}
    .card-footer{padding:12px 20px 24px}
    .contact-item{padding:12px 12px}
    .name{font-size:26px;letter-spacing:3px}
    .avatar-ring{width:90px;height:90px}
    .avatar svg{width:48px;height:48px}
    .save-tip{padding:0 20px 20px}
    .video-header{padding:14px 20px}
    .video-body{padding:16px 16px 20px}
    .video-hint{padding:0 16px 16px}
  }
</style>
</head>
